<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 128px;
    height: 128px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .yt-shape {
    width: 116px;
    height: 80px;
    background: linear-gradient(160deg, #FF1A1A 0%, #D40000 50%, #B80000 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow:
      0 3px 10px rgba(180,0,0,0.35),
      0 1px 3px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* SVG icon container */
  .icon-svg {
    position: relative;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
  <div class="yt-shape">
    <svg class="icon-svg" viewBox="0 0 116 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Subtle inner highlight -->
        <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.85)"/>
        </linearGradient>
        <!-- Drop shadow for search glass -->
        <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0.5" stdDeviation="1.2" flood-color="rgba(0,0,0,0.3)"/>
        </filter>
        <!-- Soft glow behind play button -->
        <filter id="playGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="rgba(255,255,255,0.2)"/>
        </filter>
      </defs>

      <!-- Play triangle — optically centered (shifted right slightly) -->
      <polygon
        points="42,22 42,58 76,40"
        fill="url(#playGrad)"
        filter="url(#playGlow)"
      />

      <!-- Magnifying glass — overlapping the play triangle -->
      <g transform="translate(58, 38)" filter="url(#glassShadow)">
        <!-- Glass circle -->
        <circle cx="10" cy="10" r="10" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Handle -->
        <line x1="17.5" y1="17.5" x2="26" y2="26" stroke="white" stroke-width="4" stroke-linecap="round"/>
      </g>
    </svg>
  </div>
</body>
</html>
