<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .yt-shape {
    width: 29px;
    height: 20px;
    background: linear-gradient(160deg, #FF1A1A 0%, #D40000 50%, #B80000 100%);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 1px 2px rgba(180,0,0,0.35);
  }
  .icon-svg {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
  <div class="yt-shape">
    <svg class="icon-svg" viewBox="0 0 116 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.85)"/>
        </linearGradient>
      </defs>
      <polygon points="42,22 42,58 76,40" fill="url(#playGrad)"/>
      <g transform="translate(58, 38)">
        <circle cx="10" cy="10" r="10" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="17.5" y1="17.5" x2="26" y2="26" stroke="white" stroke-width="6" stroke-linecap="round"/>
      </g>
    </svg>
  </div>
</body>
</html>
