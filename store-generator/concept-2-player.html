<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 800px;
    background: linear-gradient(160deg, #f8f9fa 0%, #e8eaed 100%);
    font-family: Roboto, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    overflow: hidden;
    position: relative;
  }

  /* Faint video player in background */
  .bg-player {
    position: absolute;
    top: 50%;
    right: 120px;
    transform: translateY(-50%);
    width: 560px;
    height: 380px;
    background: #000;
    border-radius: 12px;
    opacity: 0.06;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-player-play {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 30px 0 30px 52px;
    border-color: transparent transparent transparent white;
  }
  /* Faint progress bar */
  .bg-player-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #333;
    border-radius: 0 0 12px 12px;
  }
  .bg-player-bar-fill {
    width: 35%;
    height: 100%;
    background: red;
    border-radius: 0 0 0 12px;
  }

  .text-side, .dialog { position: relative; z-index: 1; }

  .text-side { max-width: 380px; }
  .text-side h1 { font-size: 36px; font-weight: 500; color: #0f0f0f; line-height: 1.2; margin-bottom: 12px; }
  .text-side p { font-size: 18px; color: #606060; line-height: 1.5; }

  .dialog {
    width: 420px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .dialog-header { padding: 16px 20px 12px; font-size: 16px; font-weight: 500; color: #0f0f0f; border-bottom: 1px solid #e5e5e5; }
  .filter-bar { padding: 10px 16px 8px; border-bottom: 1px solid rgba(0,0,0,0.1); background: #fff; }
  .filter-row { display: flex; align-items: center; gap: 8px; }
  .filter-input-wrap { position: relative; flex: 1; }
  .filter-input { width: 100%; height: 36px; border: 1px solid rgba(6,95,212,0.55); border-radius: 18px; padding: 0 32px 0 12px; font-family: inherit; font-size: 14px; color: #0f0f0f; outline: 2px solid rgba(6,95,212,0.28); outline-offset: 0; }
  .filter-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; border: none; border-radius: 50%; background: transparent; color: #606060; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .filter-meta { margin: 6px 2px 0; color: #606060; font-size: 12px; }
  .playlist-list { max-height: 320px; overflow: hidden; }
  .playlist-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; }
  .checkbox { width: 18px; height: 18px; border: 2px solid #909090; border-radius: 3px; flex-shrink: 0; }
  .checkbox.checked { background: #065fd4; border-color: #065fd4; position: relative; }
  .checkbox.checked::after { content: '✓'; color: white; font-size: 12px; position: absolute; top: -1px; left: 2px; }
  .playlist-name { font-size: 14px; color: #0f0f0f; }
  .playlist-name mark { background: #bbdefb; color: #0f0f0f; border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>
  <div class="bg-player">
    <div class="bg-player-play"></div>
    <div class="bg-player-bar"><div class="bg-player-bar-fill"></div></div>
  </div>
  <div class="text-side">
    <h1>Find any playlist instantly</h1>
    <p>Search and filter inside YouTube's "Save to playlist" dialog — even beyond the 200 limit.</p>
  </div>
  <div class="dialog">
    <div class="dialog-header">Save video to...</div>
    <div class="filter-bar">
      <div class="filter-row">
        <div class="filter-input-wrap">
          <input class="filter-input" value="lofi" readonly>
          <button class="filter-clear">✕</button>
        </div>
      </div>
      <div class="filter-meta">3 of 847 playlists</div>
    </div>
    <div class="playlist-list">
      <div class="playlist-row"><div class="checkbox"></div><span class="playlist-name"><mark>lofi</mark> study sessions</span></div>
      <div class="playlist-row"><div class="checkbox checked"></div><span class="playlist-name"><mark>lofi</mark> beats for focus</span></div>
      <div class="playlist-row"><div class="checkbox"></div><span class="playlist-name">chill <mark>lofi</mark> & rain</span></div>
    </div>
  </div>
</body>
</html>
