name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check (content script)
        run: node --check src/content.js

      - name: Syntax check (background + onboarding + welcome)
        run: |
          node --check src/background.js
          node --check src/onboarding-state.js
          node --check src/welcome.js

      - name: Install typecheck deps
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Typecheck (JSDoc + tsc --checkJs)
        run: npm run typecheck

      - name: Regression tests
        run: node src/test-search.js

      - name: Feed-page mount regression
        run: node tests/test-feed-page-mount.mjs

      - name: CWS structural validator
        run: node scripts/validate-cws.mjs
